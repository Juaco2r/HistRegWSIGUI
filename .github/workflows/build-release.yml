name: Build desktop releases

on:
  workflow_dispatch:
    inputs:
      cuda_target:
        description: "Optional large CUDA build (~3 GB): none, Windows, Linux, or both"
        required: true
        type: choice
        default: none
        options:
          - none
          - windows
          - linux
          - both
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: histreggui-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-matrix:
    name: Prepare build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.targets.outputs.matrix }}

    steps:
      - name: Select build targets
        id: targets
        env:
          # Tag pushes intentionally publish the smaller CPU applications only.
          # To publish CUDA for a tag, manually dispatch this workflow while
          # selecting that tag as the ref and choose the desired CUDA target.
          CUDA_TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.cuda_target || 'none' }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os

          targets = [
              {
                  "runner": "windows-latest",
                  "asset_platform": "Windows",
                  "platform_label": "windows",
                  "architecture": "x64",
                  "variant": "cpu",
                  "torch_index": "cpu",
                  "torch_version": "2.5.1",
                  "torchvision_version": "0.20.1",
              },
              {
                  "runner": "ubuntu-22.04",
                  "asset_platform": "Linux",
                  "platform_label": "linux",
                  "architecture": "x64",
                  "variant": "cpu",
                  "torch_index": "cpu",
                  "torch_version": "2.5.1",
                  "torchvision_version": "0.20.1",
              },
              {
                  "runner": "macos-15-intel",
                  "asset_platform": "macOS",
                  "platform_label": "macos",
                  "architecture": "Intel-x64",
                  "variant": "cpu",
                  "torch_index": "macos",
                  # PyTorch stopped publishing macOS Intel wheels after 2.2.x.
                  "torch_version": "2.2.2",
                  "torchvision_version": "0.17.2",
              },
              {
                  "runner": "macos-15",
                  "asset_platform": "macOS",
                  "platform_label": "macos",
                  "architecture": "Apple-Silicon",
                  "variant": "cpu",
                  "torch_index": "macos",
                  "torch_version": "2.5.1",
                  "torchvision_version": "0.20.1",
              },
          ]

          cuda_target = os.environ.get("CUDA_TARGET", "none").strip().lower()
          if cuda_target in {"windows", "both"}:
              targets.append(
                  {
                      "runner": "windows-latest",
                      "asset_platform": "Windows",
                      "platform_label": "windows",
                      "architecture": "x64",
                      "variant": "cuda",
                      "torch_index": "cu118",
                      "torch_version": "2.5.1",
                      "torchvision_version": "0.20.1",
                  }
              )
          if cuda_target in {"linux", "both"}:
              targets.append(
                  {
                      "runner": "ubuntu-22.04",
                      "asset_platform": "Linux",
                      "platform_label": "linux",
                      "architecture": "x64",
                      "variant": "cuda",
                      "torch_index": "cu118",
                      "torch_version": "2.5.1",
                      "torchvision_version": "0.20.1",
                  }
              )

          matrix = json.dumps({"include": targets}, separators=(",", ":"))
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"matrix={matrix}\n")
          print(json.dumps({"include": targets}, indent=2))
          PY

  build:
    name: ${{ matrix.asset_platform }} ${{ matrix.architecture }} ${{ matrix.variant }}
    needs: prepare-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    env:
      PIP_NO_CACHE_DIR: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install PyTorch for macOS
        if: matrix.torch_index == 'macos'
        run: >-
          python -m pip install
          torch==${{ matrix.torch_version }}
          torchvision==${{ matrix.torchvision_version }}

      - name: Install CPU-only PyTorch
        if: matrix.torch_index == 'cpu'
        run: >-
          python -m pip install
          torch==${{ matrix.torch_version }}
          torchvision==${{ matrix.torchvision_version }}
          --index-url https://download.pytorch.org/whl/cpu

      - name: Install CUDA-enabled PyTorch
        if: matrix.torch_index == 'cu118'
        run: >-
          python -m pip install
          torch==${{ matrix.torch_version }}
          torchvision==${{ matrix.torchvision_version }}
          --index-url https://download.pytorch.org/whl/cu118

      - name: Install application and build dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Verify runtime imports
        shell: bash
        run: |
          python - <<'PY'
          import deeperhistreg
          import openslide
          import pyvips
          import torch
          import torchvision
          print("DeeperHistReg:", deeperhistreg.__file__)
          print("PyTorch:", torch.__version__)
          print("torchvision:", torchvision.__version__)
          print("Compiled CUDA:", torch.version.cuda)
          print("OpenSlide:", openslide.__version__)
          print("pyvips:", pyvips.__version__)
          PY

      - name: Run hardware configuration tests
        shell: bash
        env:
          PYTHONPATH: src
        run: python -m pytest -q tests/test_hardware.py

      - name: Build application
        run: >-
          python scripts/build_app.py
          --variant ${{ matrix.variant }}
          --platform-label ${{ matrix.platform_label }}
          --architecture ${{ matrix.architecture }}

      - name: Ad-hoc sign macOS application
        if: runner.os == 'macOS'
        shell: bash
        run: |
          codesign --force --deep --sign - dist/HistRegGUI.app
          codesign --verify --deep --strict --verbose=2 dist/HistRegGUI.app

      - name: Smoke-test packaged application
        run: python scripts/smoke_test_build.py

      - name: Package release archive
        run: >-
          python scripts/package_release.py
          --platform ${{ matrix.asset_platform }}
          --architecture ${{ matrix.architecture }}
          --variant ${{ matrix.variant }}

      - name: Report release size
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          for path in Path("release-assets").glob("*"):
              size = path.stat().st_size / (1024 ** 3)
              print(f"{path.name}: {size:.2f} GiB")
          PY

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: HistRegGUI-${{ matrix.asset_platform }}-${{ matrix.architecture }}-${{ matrix.variant }}
          path: release-assets/*
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all platform archives
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v3
        with:
          files: release-assets/*
          generate_release_notes: true
          fail_on_unmatched_files: true
