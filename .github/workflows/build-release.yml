name: Build desktop releases

on:
  workflow_dispatch:
    inputs:
      build_cuda:
        description: Build the optional CUDA editions for Windows and Linux
        required: false
        type: boolean
        default: true
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: histreggui-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.asset_platform }} ${{ matrix.architecture }} ${{ matrix.variant }}
    if: github.event_name != 'workflow_dispatch' || matrix.variant == 'cpu' || inputs.build_cuda
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            asset_platform: Windows
            platform_label: windows
            architecture: x64
            variant: cpu
            torch_index: cpu

          - runner: ubuntu-22.04
            asset_platform: Linux
            platform_label: linux
            architecture: x64
            variant: cpu
            torch_index: cpu

          - runner: macos-15-intel
            asset_platform: macOS
            platform_label: macos
            architecture: Intel-x64
            variant: cpu
            torch_index: macos

          - runner: macos-15
            asset_platform: macOS
            platform_label: macos
            architecture: Apple-Silicon
            variant: cpu
            torch_index: macos

          - runner: windows-latest
            asset_platform: Windows
            platform_label: windows
            architecture: x64
            variant: cuda
            torch_index: cu118

          - runner: ubuntu-22.04
            asset_platform: Linux
            platform_label: linux
            architecture: x64
            variant: cuda
            torch_index: cu118

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    env:
      PIP_NO_CACHE_DIR: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install PyTorch for macOS
        if: matrix.torch_index == 'macos'
        run: python -m pip install torch==2.5.1 torchvision==0.20.1

      - name: Install CPU-only PyTorch
        if: matrix.torch_index == 'cpu'
        run: >-
          python -m pip install
          torch==2.5.1 torchvision==0.20.1
          --index-url https://download.pytorch.org/whl/cpu

      - name: Install CUDA-enabled PyTorch
        if: matrix.torch_index == 'cu118'
        run: >-
          python -m pip install
          torch==2.5.1 torchvision==0.20.1
          --index-url https://download.pytorch.org/whl/cu118

      - name: Install application and build dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Verify runtime imports
        shell: bash
        run: |
          python - <<'PY'
          import deeperhistreg
          import openslide
          import pyvips
          import torch
          print("DeeperHistReg:", deeperhistreg.__file__)
          print("PyTorch:", torch.__version__)
          print("Compiled CUDA:", torch.version.cuda)
          print("OpenSlide:", openslide.__version__)
          print("pyvips:", pyvips.__version__)
          PY

      - name: Run hardware configuration tests
        shell: bash
        env:
          PYTHONPATH: src
        run: python -m pytest -q tests/test_hardware.py

      - name: Build application
        run: >-
          python scripts/build_app.py
          --variant ${{ matrix.variant }}
          --platform-label ${{ matrix.platform_label }}
          --architecture ${{ matrix.architecture }}

      - name: Smoke-test packaged application
        run: python scripts/smoke_test_build.py

      - name: Package release archive
        run: >-
          python scripts/package_release.py
          --platform ${{ matrix.asset_platform }}
          --architecture ${{ matrix.architecture }}
          --variant ${{ matrix.variant }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: HistRegGUI-${{ matrix.asset_platform }}-${{ matrix.architecture }}-${{ matrix.variant }}
          path: release-assets/*
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all platform archives
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          fail_on_unmatched_files: true
