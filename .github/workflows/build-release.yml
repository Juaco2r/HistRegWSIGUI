name: Build desktop releases

on:
  workflow_dispatch:
    inputs:
      cuda_target:
        description: "CUDA builds to generate (~3 GB each). Both are generated by default."
        required: true
        type: choice
        default: both
        options:
          - none
          - windows
          - linux
          - both
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: histreggui-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-matrix:
    name: Prepare build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.targets.outputs.matrix }}

    steps:
      - name: Select build targets
        id: targets
        env:
          # Manual runs generate both CUDA packages by default, but the dropdown
          # can still be used to omit one or both when a smaller build is desired.
          # Tag pushes always generate and publish both Windows and Linux CUDA.
          CUDA_TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.cuda_target || 'both' }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os

          targets = [
              {
                  "runner": "windows-latest",
                  "asset_platform": "Windows",
                  "platform_label": "windows",
                  "architecture": "x64",
                  "variant": "cpu",
                  "torch_index": "cpu",
                  "torch_version": "2.5.1",
                  "torchvision_version": "0.20.1",
              },
              {
                  "runner": "ubuntu-22.04",
                  "asset_platform": "Linux",
                  "platform_label": "linux",
                  "architecture": "x64",
                  "variant": "cpu",
                  "torch_index": "cpu",
                  "torch_version": "2.5.1",
                  "torchvision_version": "0.20.1",
              },
              {
                  "runner": "macos-15-intel",
                  "asset_platform": "macOS",
                  "platform_label": "macos",
                  "architecture": "Intel-x64",
                  "variant": "cpu",
                  "torch_index": "macos",
                  # PyTorch stopped publishing macOS Intel wheels after 2.2.x.
                  "torch_version": "2.2.2",
                  "torchvision_version": "0.17.2",
              },
              {
                  "runner": "macos-15",
                  "asset_platform": "macOS",
                  "platform_label": "macos",
                  "architecture": "Apple-Silicon",
                  "variant": "cpu",
                  "torch_index": "macos",
                  "torch_version": "2.5.1",
                  "torchvision_version": "0.20.1",
              },
          ]

          cuda_target = os.environ.get("CUDA_TARGET", "none").strip().lower()
          if cuda_target in {"windows", "both"}:
              targets.append(
                  {
                      "runner": "windows-latest",
                      "asset_platform": "Windows",
                      "platform_label": "windows",
                      "architecture": "x64",
                      "variant": "cuda",
                      "torch_index": "cu118",
                      "torch_version": "2.5.1",
                      "torchvision_version": "0.20.1",
                  }
              )
          if cuda_target in {"linux", "both"}:
              targets.append(
                  {
                      "runner": "ubuntu-22.04",
                      "asset_platform": "Linux",
                      "platform_label": "linux",
                      "architecture": "x64",
                      "variant": "cuda",
                      "torch_index": "cu118",
                      "torch_version": "2.5.1",
                      "torchvision_version": "0.20.1",
                  }
              )

          matrix = json.dumps({"include": targets}, separators=(",", ":"))
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"matrix={matrix}\n")
          print(json.dumps({"include": targets}, indent=2))
          PY

  build:
    name: ${{ matrix.asset_platform }} ${{ matrix.architecture }} ${{ matrix.variant }}
    needs: prepare-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    env:
      PIP_NO_CACHE_DIR: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate v2.0 release metadata
        shell: bash
        env:
          RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
        run: python scripts/validate_release_metadata.py --tag "$RELEASE_TAG"

      - name: Install compatible packaging tools
        # setuptools 82 removed pkg_resources. PyInstaller's pkg_resources
        # runtime hook still subclasses pkg_resources.NullProvider, so keep
        # setuptools 81 until that compatibility layer is no longer required.
        run: python -m pip install --upgrade pip wheel "setuptools==81.0.0"

      - name: Install PyTorch for macOS
        if: matrix.torch_index == 'macos'
        run: >-
          python -m pip install
          torch==${{ matrix.torch_version }}
          torchvision==${{ matrix.torchvision_version }}

      - name: Install CPU-only PyTorch
        if: matrix.torch_index == 'cpu'
        run: >-
          python -m pip install
          torch==${{ matrix.torch_version }}
          torchvision==${{ matrix.torchvision_version }}
          --index-url https://download.pytorch.org/whl/cpu

      - name: Install CUDA-enabled PyTorch
        if: matrix.torch_index == 'cu118'
        run: >-
          python -m pip install
          torch==${{ matrix.torch_version }}
          torchvision==${{ matrix.torchvision_version }}
          --index-url https://download.pytorch.org/whl/cu118

      - name: Install application and build dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Verify PyInstaller packaging compatibility
        shell: bash
        run: |
          python - <<'PY'
          import importlib.metadata
          import pkg_resources

          setuptools_version = importlib.metadata.version("setuptools")
          pyinstaller_version = importlib.metadata.version("pyinstaller")
          print("setuptools:", setuptools_version)
          print("PyInstaller:", pyinstaller_version)
          print("pkg_resources:", pkg_resources.__file__)
          if not hasattr(pkg_resources, "NullProvider"):
              raise RuntimeError(
                  "Incompatible pkg_resources: NullProvider is missing. "
                  "The build requires setuptools 81.x."
              )
          PY

      - name: Verify runtime imports and Pillow Tk bridge
        shell: bash
        env:
          PYTHONPATH: src
        run: |
          python - <<'PY'
          import sys
          import deeperhistreg
          import openslide
          import pyvips
          import tifffile
          import zarr
          import numcodecs
          import imagecodecs
          import torch
          import torchvision
          from histreggui.pillow_compat import install_pillow_tkinter_finder_alias

          finder = install_pillow_tkinter_finder_alias()
          from PIL import Image, ImageTk

          assert finder.__name__ == "PIL._tkinter_finder"
          assert sys.modules["PIL.tkinter_finder"] is finder
          assert Image is not None and ImageTk is not None
          print("DeeperHistReg:", deeperhistreg.__file__)
          print("PyTorch:", torch.__version__)
          print("torchvision:", torchvision.__version__)
          print("Compiled CUDA:", torch.version.cuda)
          print("OpenSlide:", openslide.__version__)
          print("pyvips:", pyvips.__version__)
          print("tifffile:", tifffile.__version__)
          print("zarr:", zarr.__version__)
          print("numcodecs:", numcodecs.__version__)
          print("imagecodecs:", imagecodecs.__version__)
          print("PIL._tkinter_finder and PIL.tkinter_finder alias: OK")
          PY

      - name: Run application tests
        shell: bash
        env:
          PYTHONPATH: src
        run: python -m pytest -q tests

      - name: Build application
        run: >-
          python scripts/build_app.py
          --variant ${{ matrix.variant }}
          --platform-label ${{ matrix.platform_label }}
          --architecture ${{ matrix.architecture }}

      - name: Ad-hoc sign macOS application
        if: runner.os == 'macOS'
        shell: bash
        run: |
          codesign --force --deep --sign - dist/HistRegGUI.app
          codesign --verify --deep --strict --verbose=2 dist/HistRegGUI.app

      - name: Smoke-test packaged application
        run: python scripts/smoke_test_build.py

      - name: Package release archive
        run: >-
          python scripts/package_release.py
          --platform ${{ matrix.asset_platform }}
          --architecture ${{ matrix.architecture }}
          --variant ${{ matrix.variant }}

      - name: Report release size
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          for path in Path("release-assets").glob("*"):
              size = path.stat().st_size / (1024 ** 3)
              print(f"{path.name}: {size:.2f} GiB")
          PY

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: HistRegGUI-${{ matrix.asset_platform }}-${{ matrix.architecture }}-${{ matrix.variant }}
          path: release-assets/*
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all platform archives
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v3
        with:
          files: release-assets/*
          generate_release_notes: true
          fail_on_unmatched_files: true
